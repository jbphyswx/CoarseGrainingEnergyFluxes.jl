name = "CoarseGrainingEnergyFluxes"
uuid = "a8c2fbc6-778a-4d2b-8a8c-9c98efc7e8cf"
version = "0.1.0"
authors = ["Jordan Benjamin"]

[workspace]
projects = ["test", "docs"]

# NUFSHT is unregistered (jbphyswx ecosystem); a source lets Pkg resolve the optional scattered-
# spherical spectral weakdep/extension. Registering NUFSHT would let this be dropped.
[sources]
NUFSHT = { url = "https://github.com/jbphyswx/NUFSHT.jl" }

[deps]
LinearAlgebra = "37e2e46d-f89d-539d-b4ee-838fcccc9c8e"
PrecompileTools = "aea7be01-6a6a-4083-8856-8a6e6704d82a"
StaticArrays = "90137ffa-7385-5640-81b9-e52037218182"

[weakdeps]
CairoMakie = "13f3f980-e62b-5c42-98c6-ff1f3baf88f0"
DelaunayTriangulation = "927a84f5-c5f4-47a5-9785-b46e178433df"
Distributed = "8ba89e20-285c-5b6f-9357-94700520ee1b"
FFTW = "7a1cc6ca-52ef-59f5-83cd-3a7055c09341"
FINUFFT = "d8beea63-0952-562e-9c6a-8e8ef7364055"
FastSphericalHarmonics = "d335c211-7587-445e-a753-f0b1fb7e445f"
KernelAbstractions = "63c18a36-062a-441e-b654-da1e3ab1ce7c"
MPI = "da04e1cc-30fd-572f-bb4f-1f8673147195"
NUFSHT = "e99b67a3-9706-455a-90e2-85b195a33206"
NearestNeighbors = "b8a86587-4115-5ab1-83bc-aa920d37bbce"
OhMyThreads = "67456a42-1dca-4109-a031-0a68de7e3ad5"
Quickhull = "baca2653-9c88-49d2-a488-12dbf25fc4fb"
SharedArrays = "1a1011a3-84de-559e-8e89-a11a2f7dc383"

[extensions]
CoarseGrainingEnergyFluxesCairoMakieExt = ["CairoMakie"]
CoarseGrainingEnergyFluxesDelaunayTriangulationExt = ["DelaunayTriangulation"]
CoarseGrainingEnergyFluxesDistributedExt = ["Distributed", "SharedArrays"]
CoarseGrainingEnergyFluxesFFTWExt = ["FFTW"]
CoarseGrainingEnergyFluxesFINUFFTExt = ["FINUFFT"]
CoarseGrainingEnergyFluxesFastSphericalHarmonicsExt = ["FastSphericalHarmonics"]
CoarseGrainingEnergyFluxesGPUExt = ["KernelAbstractions"]
CoarseGrainingEnergyFluxesMPIExt = ["MPI"]
CoarseGrainingEnergyFluxesNUFSHTExt = ["NUFSHT"]
CoarseGrainingEnergyFluxesNearestNeighborsExt = ["NearestNeighbors"]
CoarseGrainingEnergyFluxesOhMyThreadsExt = ["OhMyThreads"]
CoarseGrainingEnergyFluxesQuickhullExt = ["Quickhull"]

[compat]
CairoMakie = "0.15"
DelaunayTriangulation = "1"
Distributed = "1"
FFTW = "1"
FINUFFT = "3"
FastSphericalHarmonics = "1"
KernelAbstractions = "0.9"
LinearAlgebra = "1"
MPI = "0.20"
NUFSHT = "0.1"
NearestNeighbors = "0.4"
OhMyThreads = "0.8"
PrecompileTools = "1.2, 1.3"
Quickhull = "0.2"
SharedArrays = "1"
StaticArrays = "1.9"
Test = "1"
julia = "1.11"

# NUFSHT is also listed here so its `[sources]` git URL is honored (Pkg requires a source's package to
# appear in `deps`/`extras`); it remains an optional weakdep loaded only via its extension.
[extras]
NUFSHT = "e99b67a3-9706-455a-90e2-85b195a33206"
Test = "8dfed614-e22c-5e08-85e1-65c5234f0b40"

[targets]
test = ["NUFSHT", "Test"]
